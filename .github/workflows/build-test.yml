name: Build and Test

on:
  push:
    branches: [main, develop]
    paths:
      - 'sample-app/**'
      - '.github/workflows/build-test.yml'
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build-and-test:
    name: Build and Test
    runs-on: ubuntu-latest
    
    env:
      NODE_ENV: test
      LOG_LEVEL: debug
    
    strategy:
      matrix:
        node-version: [16.x, 18.x, 20.x]
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Print environment
        run: |
          echo "Environment: ${{ env.NODE_ENV }}"
          echo "Log Level: ${{ env.LOG_LEVEL }}"
      
      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
      
      - name: Install dependencies
        working-directory: ./sample-app
        run: npm install
      
      - name: Run linter
        working-directory: ./sample-app
        run: npm run lint
        continue-on-error: true
      
      - name: Build application
        working-directory: ./sample-app
        run: npm run build
      
      - name: Run tests
        working-directory: ./sample-app
        run: npm test
      
      - name: Create build output
        working-directory: ./sample-app
        run: |
          mkdir -p build-output
          echo "Build completed at $(date)" > build-output/build-info.txt
          echo "Node version: ${{ matrix.node-version }}" >> build-output/build-info.txt
          echo "Environment: ${{ env.NODE_ENV }}" >> build-output/build-info.txt
          cp package.json build-output/
          [ -d dist ] && cp -r dist build-output/ || echo "No dist folder (OK for this project)"
      
      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-output-${{ matrix.node-version }}
          path: sample-app/build-output/
          retention-days: 30
      
      - name: Upload coverage reports
        if: matrix.node-version == '18.x'
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report-${{ matrix.node-version }}
          path: sample-app/coverage/
          retention-days: 30
      
      - name: Check coverage
        if: always()
        working-directory: ./sample-app
        run: |
          if [ -f coverage/coverage-summary.json ]; then
            echo "✅ Coverage report generated"
          else
            echo "⚠️ No coverage report found"
          fi

  lint-check:
    name: Lint Check
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-node@v4
        with:
          node-version: '18'
      
      - working-directory: ./sample-app
        run: npm install
      
      - name: Run ESLint
        working-directory: ./sample-app
        run: npm run lint
        continue-on-error: true

  test-summary:
    name: Test Summary
    runs-on: ubuntu-latest
    needs: [build-and-test]
    if: always()
    
    steps:
      - name: Print test results
        run: |
          echo "🎯 Test Run Summary"
          echo "==================="
          echo "✅ All tests completed"

  download-artifacts:
    name: Download and Verify Artifacts
    runs-on: ubuntu-latest
    needs: [build-and-test]
    
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
      
      - name: List downloaded artifacts
        run: |
          echo "📦 Downloaded Artifacts:"
          echo "======================="
          find artifacts -type f | head -20
          echo ""
          echo "Artifact structure:"
          tree artifacts 2>/dev/null || find artifacts -type d
      
      - name: Show build info from artifacts
        run: |
          echo "🔍 Build Information from Artifacts:"
          echo "===================================="
          for file in artifacts/build-output-*/build-info.txt; do
            if [ -f "$file" ]; then
              echo ""
              echo "From: $file"
              cat "$file"
            fi
          done
      
      - name: Verify artifacts integrity
        run: |
          echo "✅ Artifacts successfully downloaded and available for next steps!"
          echo "This demonstrates passing data between jobs using artifacts."
